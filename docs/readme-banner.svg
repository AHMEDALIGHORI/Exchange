<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 220" role="img" aria-label="ExChange  Sepolia Web3 lab">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="55%" stop-color="#111113"/>
      <stop offset="100%" stop-color="#0c1014"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="35%" stop-color="#22c55e" stop-opacity="0.9"/>
      <stop offset="65%" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#fafafa" stroke-opacity="0.04" stroke-width="0.5"/>
    </pattern>
    <clipPath id="titleReveal">
      <rect x="48" y="58" height="52" fill="#fff">
        <animate attributeName="width" values="0;340;340;340" keyTimes="0;0.35;0.85;1" dur="6s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="920" height="220" fill="url(#bg)"/>
  <rect width="920" height="220" fill="url(#grid)"/>

  <!-- scanline -->
  <rect x="0" y="-4" width="920" height="3" fill="#22c55e" opacity="0.08">
    <animate attributeName="y" values="-4;224" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- top accent bar -->
  <rect x="0" y="0" width="920" height="2" fill="url(#accentLine)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- terminal chrome -->
  <rect x="24" y="24" width="872" height="172" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <circle cx="44" cy="44" r="5" fill="#ef4444" opacity="0.85"/>
  <circle cx="62" cy="44" r="5" fill="#f97316" opacity="0.85"/>
  <circle cx="80" cy="44" r="5" fill="#22c55e" opacity="0.85"/>
  <text x="100" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#71717a">exchange@sepolia:~</text>

  <!-- blockchain motif -->
  <g transform="translate(640, 118)" opacity="0.9">
    <rect x="0" y="0" width="44" height="32" rx="4" fill="#1f1f23" stroke="#38bdf8" stroke-width="1.2" filter="url(#glowCyan)">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="58" y="0" width="44" height="32" rx="4" fill="#1f1f23" stroke="#22c55e" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.4s" begin="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="116" y="0" width="44" height="32" rx="4" fill="#1f1f23" stroke="#f97316" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
    <line x1="44" y1="16" x2="58" y2="16" stroke="#71717a" stroke-width="1.5" stroke-dasharray="4 3">
      <animate attributeName="stroke-dashoffset" values="14;0" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="102" y1="16" x2="116" y2="16" stroke="#71717a" stroke-width="1.5" stroke-dasharray="4 3">
      <animate attributeName="stroke-dashoffset" values="14;0" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
    </line>
    <text x="22" y="20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#38bdf8">blk</text>
    <text x="80" y="20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#22c55e">tx</text>
    <text x="138" y="20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#f97316">sig</text>
  </g>

  <!-- title -->
  <text x="48" y="98" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="42" font-weight="700" fill="#fafafa" clip-path="url(#titleReveal)">ExChange</text>
  <text x="48" y="98" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="42" font-weight="700" fill="#fafafa" opacity="0.12">ExChange</text>

  <!-- blinking cursor -->
  <rect x="292" y="68" width="3" height="36" fill="#22c55e" filter="url(#glowGreen)">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- tagline -->
  <text x="48" y="128" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#a1a1aa">
    <tspan fill="#71717a">&gt; </tspan>
    <tspan>wallet · swap · stake · NFT · institutional settlement</tspan>
  </text>

  <!-- Sepolia status -->
  <g transform="translate(48, 148)">
    <circle cx="6" cy="6" r="5" fill="#22c55e" filter="url(#glowGreen)">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="6" cy="6" r="10" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.35">
      <animate attributeName="r" values="6;14;6" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="22" y="10" font-family="ui-monospace, monospace" font-size="12" fill="#22c55e">Sepolia testnet</text>
    <text x="148" y="10" font-family="ui-monospace, monospace" font-size="11" fill="#71717a">chainId 11155111</text>
  </g>

  <!-- coin orbit -->
  <g transform="translate(560, 72)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="3 5">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="18" cy="0" r="4" fill="#f97316">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="5" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#fafafa">EXC</text>
  </g>

  <!-- bottom prompt line -->
  <text x="48" y="178" font-family="ui-monospace, monospace" font-size="11" fill="#71717a">
    <tspan fill="#22c55e">$</tspan> npm run dev
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
  </text>
</svg>
