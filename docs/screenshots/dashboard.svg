<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="Dashboard screenshot placeholder">
  <rect width="400" height="240" fill="#111113" stroke="#27272a"/>
  <rect x="12" y="12" width="376" height="24" rx="4" fill="#18181b"/>
  <text x="200" y="156" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#71717a">dashboard</text>
  <text x="200" y="178" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#52525b">replace with capture ’ docs/screenshots/</text>
