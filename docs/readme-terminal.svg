<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="ExChange quick start terminal">
  <defs>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#111113"/>
    </linearGradient>
  </defs>

  <rect width="720" height="200" rx="10" fill="url(#termBg)" stroke="#27272a" stroke-width="1"/>
  <rect width="720" height="28" rx="10" fill="#1f1f23"/>
  <rect y="18" width="720" height="10" fill="#1f1f23"/>
  <circle cx="18" cy="14" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="36" cy="14" r="5" fill="#f97316" opacity="0.8"/>
  <circle cx="54" cy="14" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="76" y="18" font-family="ui-monospace, monospace" font-size="11" fill="#71717a">quick-start.sh</text>

  <!-- line 1: npm install -->
  <text x="20" y="52" font-family="ui-monospace, monospace" font-size="13" fill="#71717a">$</text>
  <text x="36" y="52" font-family="ui-monospace, monospace" font-size="13" fill="#fafafa">npm install</text>
  <rect x="36" y="38" height="18" fill="#22c55e" opacity="0.15">
    <animate attributeName="width" values="0;0;110;110;110" keyTimes="0;0.05;0.2;0.85;1" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- line 2: cp .env -->
  <text x="20" y="78" font-family="ui-monospace, monospace" font-size="13" fill="#71717a">$</text>
  <text x="36" y="78" font-family="ui-monospace, monospace" font-size="13" fill="#fafafa" opacity="0">
    cp .env.example .env
    <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.2;0.28;0.85;1" dur="8s" repeatCount="indefinite"/>
  </text>

  <!-- line 3: compile -->
  <text x="20" y="104" font-family="ui-monospace, monospace" font-size="13" fill="#71717a">$</text>
  <text x="36" y="104" font-family="ui-monospace, monospace" font-size="13" fill="#38bdf8" opacity="0">
    npm run compile:contracts
    <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.35;0.43;0.85;1" dur="8s" repeatCount="indefinite"/>
  </text>

  <!-- line 4: deploy -->
  <text x="20" y="130" font-family="ui-monospace, monospace" font-size="13" fill="#71717a">$</text>
  <text x="36" y="130" font-family="ui-monospace, monospace" font-size="13" fill="#f97316" opacity="0">
    npm run deploy:sepolia
    <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.5;0.58;0.85;1" dur="8s" repeatCount="indefinite"/>
  </text>

  <!-- line 5: dev -->
  <text x="20" y="156" font-family="ui-monospace, monospace" font-size="13" fill="#71717a">$</text>
  <text x="36" y="156" font-family="ui-monospace, monospace" font-size="13" fill="#22c55e" opacity="0">
    npm run dev
    <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.65;0.73;0.85;1" dur="8s" repeatCount="indefinite"/>
  </text>

  <!-- success output -->
  <text x="36" y="178" font-family="ui-monospace, monospace" font-size="11" fill="#22c55e" opacity="0">
     Local: http://localhost:5173/
    <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.73;0.78;0.85;1" dur="8s" repeatCount="indefinite"/>
  </text>

  <!-- active cursor on current line -->
  <rect x="148" y="142" width="2" height="16" fill="#22c55e" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.65;0.7;0.78;0.82;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x" values="148;148;148;100;100" keyTimes="0;0.65;0.73;0.78;1" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>
